# Explicit project name — WITHOUT this, Compose derives the project from this
# file's parent dir ("docker"), which COLLIDES with acp_playground's compose
# (also in a docker/ dir): same project => same container name (docker-app-1),
# same image tag (docker-app), same network. Our deploy would then recreate acp's
# container and clobber its image. Pinning the name isolates everything:
# container meeting_store-app-1, image meeting_store-app, network meeting_store_default.
name: meeting_store
services:
  app:
    build:
      context: ../..           # repo root, so store.py + viewer/ are in context
      dockerfile: server/Dockerfile
    ports:
      - "${HOST_PORT:-5556}:3000"
    volumes:
      - ./data:/app/data       # meetings DB + M4A live only on the VM
      - ./models:/app/models   # FireRed model cache, persisted across redeploys
    # Blast-radius cap on a VM SHARED with acp: if FireRed (sherpa+onnx arena)
    # balloons, Docker OOM-kills THIS container, never acp. 2.5G fits FireRed
    # (~1.5G) + viewer; host is 7.7G (acp ~2.7G) + 4G swap. taskset -c 1 (in the
    # Dockerfile CMD) keeps us off acp's core too.
    mem_limit: 2500m
    cpus: 1.0
    restart: unless-stopped

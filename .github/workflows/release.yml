name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release + upload the .app asset

jobs:
  build-app:
    runs-on: macos-14   # Apple Silicon: swiftc (micbusy) + sips/iconutil for the bundle
    env:
      # Optional code-signing. Set these repo secrets to sign releases with a
      # stable identity (so TCC grants persist across updates for end users):
      #   SIGN_P12_BASE64     base64 of a code-signing .p12 (identity + key)
      #   SIGN_P12_PASSWORD   its export password
      #   SIGN_IDENTITY       the identity's common name (e.g. "MeetingSummary Dev")
      # Absent -> build_app.sh adhoc-signs with pinned bundle ids. Self-signed
      # still trips Gatekeeper on other machines (right-click > Open); only
      # Developer ID + notarization removes that.
      SIGN_P12_BASE64: ${{ secrets.SIGN_P12_BASE64 }}
      SIGN_P12_PASSWORD: ${{ secrets.SIGN_P12_PASSWORD }}
      SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
      - name: VERSION must match the tag
        run: |
          v=$(cat VERSION); t="${GITHUB_REF_NAME#v}"
          if [ "$v" != "$t" ]; then
            echo "::error::VERSION ($v) != tag ($t) — bump VERSION before tagging"; exit 1
          fi
      - name: Import signing certificate (optional)
        # No-op unless the SIGN_* secrets are set. Imports the .p12 into a
        # throwaway keychain and points build_floatpanel_app.sh / build_app.sh at
        # it via FLOATPANEL_SIGN_ID; otherwise those scripts adhoc-sign.
        if: ${{ env.SIGN_P12_BASE64 != '' }}
        run: |
          KC="$RUNNER_TEMP/signing.keychain-db"; PW="ci-$GITHUB_RUN_ID"
          security create-keychain -p "$PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$PW" "$KC"
          echo "$SIGN_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/id.p12"
          security import "$RUNNER_TEMP/id.p12" -k "$KC" -P "$SIGN_P12_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$PW" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          echo "FLOATPANEL_SIGN_ID=$SIGN_IDENTITY" >> "$GITHUB_ENV"
      - name: Cache floatpanel swift build
        uses: actions/cache@v4
        with:
          path: |
            swift/floatpanel/.build
          key: nativehelpers-arm64-${{ hashFiles('swift/floatpanel/Sources/**') }}
      - name: Build floatpanel (best-effort — nested into the .app below)
        # Pure Swift (AppKit/Core Audio), no Metal — fast. Must run BEFORE
        # build_app.sh so it can nest the panel as a real bundle
        # (Contents/Resources/panel/MeetingSummary.app). Best-effort: a failure
        # here degrades to launcher-without-panel rather than blocking the release.
        continue-on-error: true
        timeout-minutes: 20
        run: |
          ./build_floatpanel.sh
          ./build_floatpanel_app.sh
      - name: Build MeetingSummary.app
        run: ./build_app.sh
      - name: Zip the .app (macOS-correct)
        run: ditto -c -k --sequesterRsrc --keepParent dist/MeetingSummary.app MeetingSummary-${GITHUB_REF_NAME}.zip
      - name: Create release + attach the installer
        # Publish FIRST so the installer always ships — the chatllm prebuild below
        # is best-effort and must never block or delay the release.
        # .zip = installer (unsigned -> right-click > Open first time).
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" "MeetingSummary-${GITHUB_REF_NAME}.zip"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Cache chatllm build
        uses: actions/cache@v4
        with:
          path: chatllm.cpp
          key: chatllm-arm64-${{ hashFiles('package_chatllm.sh') }}
      - name: Build + attach prebuilt chatllm runtime (best-effort)
        # Portable arm64 bundle (rpath -> @loader_path) so users need no cmake;
        # setup_runtime.sh downloads it. Bounded + continue-on-error -> a slow/failed
        # chatllm build can't hang or fail the already-published release.
        continue-on-error: true
        timeout-minutes: 50   # cold ggml Metal build is slow; once it completes the
                              # cache makes subsequent runs fast. Still non-blocking.
        run: |
          ./package_chatllm.sh "$PWD/chatllm-runtime-arm64.tar.gz"
          gh release upload "$GITHUB_REF_NAME" "chatllm-runtime-arm64.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Cache qwen3-ane swift build
        uses: actions/cache@v4
        with:
          path: swift/qwen3-ane/.build
          key: qwen3ane-arm64-${{ hashFiles('swift/qwen3-ane/Package.resolved', 'swift/qwen3-ane/Sources/**') }}
      - name: Build + attach prebuilt ANE live helper (best-effort)
        # Swift Qwen3-ASR CoreML helper + mlx.metallib (the runner has full Xcode so
        # the Metal toolchain builds the metallib). Portable arm64; setup_runtime.sh
        # downloads it. Non-blocking — the release already shipped above.
        continue-on-error: true
        timeout-minutes: 40
        run: |
          ./build_qwen3_ane.sh
          ./package_qwen3_ane.sh "$PWD/qwen3-ane-arm64.tar.gz"
          gh release upload "$GITHUB_REF_NAME" "qwen3-ane-arm64.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Attach standalone floatpanel tarball (best-effort)
        # Already built + nested into the .app above; this just packages the same
        # binary as a standalone download for setup_runtime.sh's direct-fetch path.
        # Non-blocking — the release already shipped above.
        continue-on-error: true
        timeout-minutes: 5
        run: |
          ./package_floatpanel.sh "$PWD/floatpanel-arm64.tar.gz"
          gh release upload "$GITHUB_REF_NAME" "floatpanel-arm64.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Build + attach prebuilt Python runtime w/ deps (best-effort)
        # python-build-standalone + requirements-app.txt + mlx pre-installed —
        # bootstrap.py fetches this on a clean Mac instead of creating a venv
        # against the system python3 (which pip-installs everything over the
        # network and, worse, can trigger the Xcode CLT install prompt). Slow
        # (mlx pulls torch as a real mlx-whisper dependency) but non-blocking —
        # the release already shipped above.
        continue-on-error: true
        timeout-minutes: 40
        run: |
          ./package_pydist.sh "$PWD/pydist-arm64.tar.gz"
          gh release upload "$GITHUB_REF_NAME" "pydist-arm64.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

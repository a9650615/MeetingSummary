name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release + upload the .app asset

jobs:
  build-app:
    runs-on: macos-14   # Apple Silicon: swiftc (micbusy) + sips/iconutil for the bundle
    steps:
      - uses: actions/checkout@v4
      - name: VERSION must match the tag
        run: |
          v=$(cat VERSION); t="${GITHUB_REF_NAME#v}"
          if [ "$v" != "$t" ]; then
            echo "::error::VERSION ($v) != tag ($t) — bump VERSION before tagging"; exit 1
          fi
      - name: Build MeetingSummary.app
        run: ./build_app.sh
      - name: Zip the .app (macOS-correct)
        run: ditto -c -k --sequesterRsrc --keepParent dist/MeetingSummary.app MeetingSummary-${GITHUB_REF_NAME}.zip
      - name: Build + package prebuilt chatllm runtime (so users need no cmake)
        # Portable arm64 bundle (rpath -> @loader_path); setup_runtime.sh downloads
        # this instead of cmake-building on the user's machine. Best-effort: if the
        # chatllm build fails, the release still ships and users fall back to source.
        run: ./package_chatllm.sh "$PWD/chatllm-runtime-arm64.tar.gz" || echo "::warning::chatllm prebuild failed; users fall back to source build"
      - name: Create release + attach app + chatllm runtime
        # .zip = installer (unsigned -> right-click > Open first time).
        # chatllm-runtime-arm64.tar.gz = fetched on demand by 設定 → 加速 runtime.
        run: |
          assets=( "MeetingSummary-${GITHUB_REF_NAME}.zip" )
          [ -f chatllm-runtime-arm64.tar.gz ] && assets+=( "chatllm-runtime-arm64.tar.gz" )
          gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" "${assets[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

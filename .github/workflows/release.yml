name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release + upload the .app asset

jobs:
  build-app:
    runs-on: macos-14   # Apple Silicon: swiftc (micbusy) + sips/iconutil for the bundle
    steps:
      - uses: actions/checkout@v4
      - name: VERSION must match the tag
        run: |
          v=$(cat VERSION); t="${GITHUB_REF_NAME#v}"
          if [ "$v" != "$t" ]; then
            echo "::error::VERSION ($v) != tag ($t) — bump VERSION before tagging"; exit 1
          fi
      - name: Build MeetingSummary.app
        run: ./build_app.sh
      - name: Zip the .app (macOS-correct)
        run: ditto -c -k --sequesterRsrc --keepParent dist/MeetingSummary.app MeetingSummary-${GITHUB_REF_NAME}.zip
      - name: Create release + attach the installer
        # Publish FIRST so the installer always ships — the chatllm prebuild below
        # is best-effort and must never block or delay the release.
        # .zip = installer (unsigned -> right-click > Open first time).
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" "MeetingSummary-${GITHUB_REF_NAME}.zip"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Cache chatllm build
        uses: actions/cache@v4
        with:
          path: chatllm.cpp
          key: chatllm-arm64-${{ hashFiles('package_chatllm.sh') }}
      - name: Build + attach prebuilt chatllm runtime (best-effort)
        # Portable arm64 bundle (rpath -> @loader_path) so users need no cmake;
        # setup_runtime.sh downloads it. Bounded + continue-on-error -> a slow/failed
        # chatllm build can't hang or fail the already-published release.
        continue-on-error: true
        timeout-minutes: 30
        run: |
          ./package_chatllm.sh "$PWD/chatllm-runtime-arm64.tar.gz"
          gh release upload "$GITHUB_REF_NAME" "chatllm-runtime-arm64.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
